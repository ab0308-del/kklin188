<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 貼圖裁切去背神器</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #1a1a2e;
  --panel:  #16213e;
  --card:   #0f3460;
  --green:  #4caf50;
  --green2: #2e7d32;
  --purple: #7c4dff;
  --purple2:#4527a0;
  --teal:   #00838f;
  --teal2:  #006064;
  --red:    #c62828;
  --text:   #e0e0e0;
  --muted:  #9e9e9e;
  --border: #263238;
  --accent: #00e5ff;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── Upload Screen ─────────────────────────────── */
#uploadScreen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px;
}
#uploadScreen h1 { font-size: 2rem; font-weight: 800; color: var(--accent); }
#uploadScreen p  { color: var(--muted); }
.drop-zone {
  width: 100%; max-width: 520px;
  border: 2px dashed #37474f;
  border-radius: 16px;
  padding: 60px 30px;
  text-align: center;
  cursor: pointer;
  transition: .2s;
  position: relative;
}
.drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: rgba(0,229,255,.05); }
.drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.drop-zone .icon { font-size: 3rem; margin-bottom: 12px; }
.drop-zone strong { display: block; font-size: 1.1rem; margin-bottom: 6px; }
.drop-zone span { font-size: 0.8rem; color: var(--muted); }

/* ── Editor Screen ─────────────────────────────── */
#editorScreen {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

/* Top: canvas + controls */
#topSection {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* Canvas area */
#canvasWrap {
  flex: 1;
  overflow: auto;
  background: #111;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  position: relative;
  cursor: crosshair;
}
#canvasContainer { position: relative; display: inline-block; flex-shrink: 0; }
#imgCanvas { display: block; }
#selCanvas { position: absolute; inset: 0; pointer-events: none; }

/* Controls panel */
#controlsPanel {
  width: 250px;
  flex-shrink: 0;
  background: var(--panel);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.info-bar {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.coord-row { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
.coord-row label { color: var(--muted); width: 14px; flex-shrink: 0; }
.coord-row input {
  width: 62px;
  background: #263238;
  border: 1px solid #37474f;
  border-radius: 6px;
  color: var(--text);
  padding: 4px 6px;
  font-size: 0.8rem;
  font-family: monospace;
}
.coord-row input:focus { outline: none; border-color: var(--accent); }

.meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 0.8rem; }
.counter { color: var(--accent); font-weight: 700; white-space: nowrap; }

/* Toggle */
.toggle-wrap { display: flex; align-items: center; gap: 6px; }
.toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.tslider { position: absolute; inset: 0; background: #37474f; border-radius: 20px; transition: .2s; cursor: pointer; }
.tslider::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
.toggle input:checked + .tslider { background: var(--green); }
.toggle input:checked + .tslider::before { transform: translateX(16px); }

/* Buttons */
.btn-grid { display: flex; flex-direction: column; gap: 6px; padding: 10px 12px; }
.btn-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 9px 10px;
  border-radius: 7px; font-size: 0.83rem; font-weight: 700;
  border: none; cursor: pointer; transition: .15s; white-space: nowrap;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-purple { background: linear-gradient(135deg,var(--purple),var(--purple2)); color:#fff; }
.btn-purple:hover:not(:disabled) { filter: brightness(1.15); }
.btn-green  { background: linear-gradient(135deg,var(--green),var(--green2)); color:#fff; }
.btn-green:hover:not(:disabled)  { filter: brightness(1.15); }
.btn-teal   { background: linear-gradient(135deg,var(--teal),var(--teal2)); color:#fff; }
.btn-teal:hover:not(:disabled)   { filter: brightness(1.15); }
.btn-dark   { background: #263238; color: var(--text); border: 1px solid #37474f; }
.btn-dark:hover:not(:disabled)   { background: #37474f; }
.btn-red    { background: linear-gradient(135deg,var(--red),#b71c1c); color:#fff; }
.btn-red:hover:not(:disabled)    { filter: brightness(1.15); }

/* Params panel */
.params-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; cursor: pointer;
  border-top: 1px solid var(--border);
  font-size: 0.78rem; color: var(--muted); user-select: none;
}
.params-toggle:hover { color: var(--text); }
.params-body { display: none; padding: 10px 12px; border-top: 1px solid var(--border); background: var(--bg); }
.params-body.open { display: block; }
.param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; font-size: 0.78rem; }
.param-row label { width: 80px; flex-shrink: 0; color: var(--muted); }
.param-row input[type=range] { flex: 1; height: 4px; accent-color: var(--accent); cursor: pointer; }
.param-row .pval { width: 32px; text-align: right; color: var(--accent); font-variant-numeric: tabular-nums; }

/* ── Bottom: 16-slot sticker preview ───────────── */
#previewSection {
  height: 200px;
  flex-shrink: 0;
  background: #0d1b2a;
  border-top: 2px solid var(--border);
  display: flex;
  flex-direction: column;
}
.preview-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.preview-header h3 { font-size: 0.8rem; color: var(--accent); font-weight: 700; letter-spacing: .04em; }
.preview-header .hdr-right { display: flex; gap: 8px; align-items: center; }
#stickerGrid {
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  gap: 4px;
  padding: 6px 8px;
  overflow-x: auto;
  overflow-y: hidden;
  flex: 1;
  align-items: center;
}
@media (max-width: 900px) {
  #stickerGrid { grid-template-columns: repeat(8, 1fr); overflow-y: auto; }
  #previewSection { height: 260px; }
}
.slot {
  background: repeating-conic-gradient(#1e3040 0% 25%, #0d1b2a 0% 50%) 0 0 / 10px 10px;
  border: 1.5px dashed #2d4050;
  border-radius: 6px;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: border-color .15s;
  min-height: 0;
}
.slot.filled { border-color: #37474f; border-style: solid; }
.slot.filled:hover { border-color: var(--accent); }
.slot canvas { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
.slot .slot-num {
  position: absolute; top: 2px; left: 3px;
  font-size: 0.6rem; color: #546e7a; font-weight: 700; line-height: 1;
  pointer-events: none;
}
.slot .slot-empty-icon { font-size: 1.1rem; opacity: .2; pointer-events: none; }
.slot.processing { border-color: #ffd54f; border-style: solid; animation: pulse .8s ease-in-out infinite alternate; }
@keyframes pulse { from { opacity:.6; } to { opacity:1; } }

.slot-actions {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.6);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.slot.filled:hover .slot-actions { display: flex; }
.slot-actions button {
  font-size: 0.68rem; font-weight: 700;
  padding: 3px 8px; border-radius: 4px; border: none; cursor: pointer;
}
.slot-actions .dl-btn { background: var(--accent); color: #000; }
.slot-actions .rm-btn { background: var(--red); color: #fff; }

/* Mobile: controls below canvas */
@media (max-width: 660px) {
  #topSection { flex-direction: column; }
  #controlsPanel { width: 100%; height: auto; border-left: none; border-top: 1px solid var(--border); }
  #previewSection { height: 180px; }
  #stickerGrid { grid-template-columns: repeat(8, 1fr); }
}
</style>
</head>
<body>

<!-- ══ Upload Screen ══ -->
<div id="uploadScreen">
  <h1>✂️ LINE 貼圖裁切去背神器</h1>
  <p>上傳整張貼圖圖片，自動偵測 4×4 格，去背後打包下載</p>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="mainFileInput" accept="image/*">
    <div class="icon">🖼️</div>
    <strong>拖曳或點擊上傳圖片</strong>
    <span>支援 JPG、PNG、GIF、WebP</span>
  </div>
</div>

<!-- ══ Editor Screen ══ -->
<div id="editorScreen">

  <!-- Top: canvas + controls -->
  <div id="topSection">

    <!-- Canvas -->
    <div id="canvasWrap">
      <div id="canvasContainer">
        <canvas id="imgCanvas"></canvas>
        <canvas id="selCanvas"></canvas>
      </div>
    </div>

    <!-- Controls -->
    <div id="controlsPanel">

      <!-- Coordinates -->
      <div class="info-bar">
        <div class="coord-row">
          <label>X</label><input type="number" id="inX" value="0" min="0">
          <label>Y</label><input type="number" id="inY" value="0" min="0">
        </div>
        <div class="coord-row">
          <label>寬</label><input type="number" id="inW" value="0" min="1">
          <label>高</label><input type="number" id="inH" value="0" min="1">
        </div>
        <div class="meta-row">
          <div class="toggle-wrap">
            <label class="toggle"><input type="checkbox" id="keepBg"><span class="tslider"></span></label>
            <span style="font-size:.78rem;color:var(--muted)">保留背景</span>
          </div>
          <span class="counter">已儲存 <span id="savedCount">0</span> / 16</span>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="btn-grid">
        <button class="btn btn-purple" id="autoDetectBtn">✦ 自動偵測貼圖</button>
        <button class="btn btn-green"  id="manualCropBtn">✂ 手動裁切並加入</button>
        <div class="btn-row2">
          <button class="btn btn-dark" id="uploadNextBtn">↑ 上傳下一張</button>
          <input type="file" id="nextFileInput" accept="image/*" style="display:none">
          <button class="btn btn-dark" id="resetSelBtn">↺ 重設框選</button>
        </div>
        <button class="btn btn-teal"  id="downloadZipBtn">↓ 下載 ZIP</button>
        <div class="btn-row2">
          <button class="btn btn-red"  id="clearBtn">✕ 清空</button>
          <button class="btn btn-dark" id="redoAllBtn">↺ 全部重來</button>
        </div>
      </div>

      <!-- Parameters -->
      <div class="params-toggle" id="paramsToggle">
        <span>⚙ 去背參數設定</span>
        <span id="paramsArrow">▼</span>
      </div>
      <div class="params-body" id="paramsBody">
        <div class="param-row">
          <label>背景顏色</label>
          <input type="color" id="bgColor" value="#ffffff"
            style="width:34px;height:26px;border:1px solid #37474f;border-radius:6px;background:none;cursor:pointer;padding:2px;">
          <button id="autoDetectBgBtn" style="background:#263238;border:1px solid #37474f;border-radius:6px;color:var(--muted);padding:3px 7px;cursor:pointer;font-size:0.72rem;">自動偵測</button>
        </div>
        <div class="param-row">
          <label>去背容許值</label>
          <input type="range" id="tolerance" min="0" max="100" value="30">
          <span class="pval" id="tolVal">30</span>
        </div>
        <div class="param-row">
          <label>白邊寬度</label>
          <input type="range" id="borderWidth" min="0" max="30" value="4">
          <span class="pval" id="bdrVal">4</span>&nbsp;px
        </div>
        <div class="param-row">
          <label>自動置中</label>
          <div class="toggle-wrap"><label class="toggle"><input type="checkbox" id="autoCenter" checked><span class="tslider"></span></label></div>
        </div>
        <div class="param-row">
          <label>強制正方形</label>
          <div class="toggle-wrap"><label class="toggle"><input type="checkbox" id="forceSquare"><span class="tslider"></span></label></div>
        </div>
        <div class="param-row">
          <label>去除孔洞</label>
          <div class="toggle-wrap"><label class="toggle"><input type="checkbox" id="removeHoles" checked><span class="tslider"></span></label></div>
        </div>
      </div>

      <div style="flex:1"></div>
    </div>
  </div>

  <!-- Bottom: 16-slot sticker preview -->
  <div id="previewSection">
    <div class="preview-header">
      <h3>🗂 貼圖預覽（共 16 張）</h3>
      <div class="hdr-right">
        <button class="btn btn-dark" style="padding:4px 10px;font-size:0.75rem;" onclick="clearAll()">✕ 清空</button>
        <button class="btn btn-teal" style="padding:4px 10px;font-size:0.75rem;" id="dlAllBtn">↓ 下載 ZIP</button>
      </div>
    </div>
    <div id="stickerGrid"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────────
const MAX_SLOTS = 16;
let sourceImage = null;
let displayScale = 1;
let sel = { x:0, y:0, w:0, h:0 };
let dragging = false, dragStart = { x:0, y:0 };
let stickers = new Array(MAX_SLOTS).fill(null);  // processed canvases
let cropHistory = new Array(MAX_SLOTS).fill(null); // crop regions for redo
let paramsOpen = false;

// ─── DOM ──────────────────────────────────────────────────────────────────────
const uploadScreen    = document.getElementById('uploadScreen');
const editorScreen    = document.getElementById('editorScreen');
const imgCanvas       = document.getElementById('imgCanvas');
const selCanvas       = document.getElementById('selCanvas');
const imgCtx          = imgCanvas.getContext('2d');
const selCtx          = selCanvas.getContext('2d');
const inX = document.getElementById('inX');
const inY = document.getElementById('inY');
const inW = document.getElementById('inW');
const inH = document.getElementById('inH');
const savedCountEl    = document.getElementById('savedCount');
const stickerGrid     = document.getElementById('stickerGrid');

// ─── Init slots ───────────────────────────────────────────────────────────────
function initSlots() {
  stickerGrid.innerHTML = '';
  for (let i = 0; i < MAX_SLOTS; i++) {
    const cell = document.createElement('div');
    cell.className = 'slot';
    cell.id = `slot-${i}`;
    cell.innerHTML = `
      <span class="slot-num">${String(i+1).padStart(2,'0')}</span>
      <span class="slot-empty-icon">+</span>`;
    stickerGrid.appendChild(cell);
  }
  stickers.fill(null);
  cropHistory.fill(null);
  updateCounter();
}

function updateCounter() {
  savedCountEl.textContent = stickers.filter(Boolean).length;
}

function setSlotProcessing(i) {
  const cell = document.getElementById(`slot-${i}`);
  if (!cell) return;
  cell.className = 'slot processing';
  cell.innerHTML = `<span class="slot-num">${String(i+1).padStart(2,'0')}</span>
    <span style="font-size:1.2rem;animation:pulse .5s infinite alternate">⚙</span>`;
}

function setSlotResult(i, canvas) {
  stickers[i] = canvas;
  updateCounter();

  const cell = document.getElementById(`slot-${i}`);
  if (!cell) return;
  cell.className = 'slot filled';

  const thumb = makeThumb(canvas);
  cell.innerHTML = `<span class="slot-num">${String(i+1).padStart(2,'0')}</span>`;
  cell.appendChild(thumb);

  const actions = document.createElement('div');
  actions.className = 'slot-actions';
  actions.innerHTML = `
    <button class="dl-btn" onclick="downloadOne(${i})">↓ 下載</button>
    <button class="rm-btn" onclick="clearSlot(${i})">✕ 移除</button>`;
  cell.appendChild(actions);
}

function setSlotEmpty(i) {
  stickers[i] = null;
  const cell = document.getElementById(`slot-${i}`);
  if (!cell) return;
  cell.className = 'slot';
  cell.innerHTML = `<span class="slot-num">${String(i+1).padStart(2,'0')}</span>
    <span class="slot-empty-icon">+</span>`;
  updateCounter();
}

function clearSlot(i) {
  cropHistory[i] = null;
  setSlotEmpty(i);
}

function clearAll() {
  for (let i = 0; i < MAX_SLOTS; i++) setSlotEmpty(i);
  cropHistory.fill(null);
}

function makeThumb(canvas) {
  const c = document.createElement('canvas');
  const maxPx = 120;
  const s = Math.min(maxPx / canvas.width, maxPx / canvas.height, 1);
  c.width  = Math.round(canvas.width  * s);
  c.height = Math.round(canvas.height * s);
  c.style.maxWidth = '100%';
  c.style.maxHeight = '100%';
  c.getContext('2d').drawImage(canvas, 0, 0, c.width, c.height);
  return c;
}

// ─── File Load ────────────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});
document.getElementById('mainFileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]); e.target.value='';
});
document.getElementById('uploadNextBtn').addEventListener('click', () =>
  document.getElementById('nextFileInput').click());
document.getElementById('nextFileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]); e.target.value='';
});

function loadFile(file) {
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    URL.revokeObjectURL(url);
    sourceImage = img;
    uploadScreen.style.display = 'none';
    editorScreen.style.display = 'flex';
    initSlots();
    renderSource();
    resetSel();
  };
  img.src = url;
}

function renderSource() {
  const img = sourceImage;
  const wrap = document.getElementById('canvasWrap');
  const maxW = wrap.clientWidth  || window.innerWidth - 250;
  const maxH = wrap.clientHeight || window.innerHeight - 200;
  displayScale = Math.min(1, maxW / img.width, maxH / img.height);
  const dW = Math.round(img.width  * displayScale);
  const dH = Math.round(img.height * displayScale);
  imgCanvas.width  = selCanvas.width  = dW;
  imgCanvas.height = selCanvas.height = dH;
  imgCtx.drawImage(img, 0, 0, dW, dH);
}

// ─── Selection ────────────────────────────────────────────────────────────────
function resetSel() {
  if (!sourceImage) return;
  sel = { x:0, y:0, w: sourceImage.width, h: sourceImage.height };
  syncInputs(); drawSel();
}
function syncInputs() {
  inX.value = Math.round(sel.x); inY.value = Math.round(sel.y);
  inW.value = Math.round(sel.w); inH.value = Math.round(sel.h);
}
function syncFromInputs() {
  sel.x = Math.max(0, parseInt(inX.value)||0);
  sel.y = Math.max(0, parseInt(inY.value)||0);
  sel.w = Math.max(1, parseInt(inW.value)||1);
  sel.h = Math.max(1, parseInt(inH.value)||1);
  if (sourceImage) {
    sel.x = Math.min(sel.x, sourceImage.width-1);
    sel.y = Math.min(sel.y, sourceImage.height-1);
    sel.w = Math.min(sel.w, sourceImage.width-sel.x);
    sel.h = Math.min(sel.h, sourceImage.height-sel.y);
  }
  drawSel();
}
[inX,inY,inW,inH].forEach(el => el.addEventListener('input', syncFromInputs));

const canvasWrap = document.getElementById('canvasWrap');
canvasWrap.addEventListener('mousedown', e => {
  if (!sourceImage) return;
  dragging = true;
  const r = imgCanvas.getBoundingClientRect();
  dragStart = { x:(e.clientX-r.left)/displayScale, y:(e.clientY-r.top)/displayScale };
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragging || !sourceImage) return;
  const r = imgCanvas.getBoundingClientRect();
  const cx = (e.clientX-r.left)/displayScale;
  const cy = (e.clientY-r.top) /displayScale;
  sel.x = Math.max(0, Math.min(dragStart.x, cx));
  sel.y = Math.max(0, Math.min(dragStart.y, cy));
  sel.w = Math.min(Math.abs(cx-dragStart.x), sourceImage.width-sel.x);
  sel.h = Math.min(Math.abs(cy-dragStart.y), sourceImage.height-sel.y);
  syncInputs(); drawSel();
});
window.addEventListener('mouseup', () => { dragging = false; });

// Touch
canvasWrap.addEventListener('touchstart', e => {
  if (!sourceImage) return; e.preventDefault(); dragging = true;
  const r = imgCanvas.getBoundingClientRect(), t = e.touches[0];
  dragStart = { x:(t.clientX-r.left)/displayScale, y:(t.clientY-r.top)/displayScale };
}, { passive:false });
window.addEventListener('touchmove', e => {
  if (!dragging||!sourceImage) return;
  const r = imgCanvas.getBoundingClientRect(), t = e.touches[0];
  const cx=(t.clientX-r.left)/displayScale, cy=(t.clientY-r.top)/displayScale;
  sel.x=Math.max(0,Math.min(dragStart.x,cx)); sel.y=Math.max(0,Math.min(dragStart.y,cy));
  sel.w=Math.min(Math.abs(cx-dragStart.x),sourceImage.width-sel.x);
  sel.h=Math.min(Math.abs(cy-dragStart.y),sourceImage.height-sel.y);
  syncInputs(); drawSel();
});
window.addEventListener('touchend', () => { dragging = false; });

function drawSel() {
  selCtx.clearRect(0, 0, selCanvas.width, selCanvas.height);
  if (!sel.w||!sel.h) return;
  const sx=sel.x*displayScale, sy=sel.y*displayScale;
  const sw=sel.w*displayScale, sh=sel.h*displayScale;
  // dim overlay
  selCtx.fillStyle='rgba(0,0,0,.45)';
  selCtx.fillRect(0,0,selCanvas.width,sy);
  selCtx.fillRect(0,sy,sx,sh);
  selCtx.fillRect(sx+sw,sy,selCanvas.width-sx-sw,sh);
  selCtx.fillRect(0,sy+sh,selCanvas.width,selCanvas.height-sy-sh);
  // border
  selCtx.strokeStyle='#00e5ff'; selCtx.lineWidth=1.5; selCtx.setLineDash([6,4]);
  selCtx.strokeRect(sx+.5,sy+.5,sw-1,sh-1); selCtx.setLineDash([]);
  // corners
  const hs=8;
  selCtx.fillStyle='#00e5ff';
  [[sx,sy],[sx+sw-hs,sy],[sx,sy+sh-hs],[sx+sw-hs,sy+sh-hs]].forEach(([hx,hy])=>selCtx.fillRect(hx,hy,hs,hs));
  // show grid lines if full image
  if (sel.x===0&&sel.y===0&&sourceImage&&Math.abs(sel.w-sourceImage.width)<2&&Math.abs(sel.h-sourceImage.height)<2) {
    selCtx.strokeStyle='rgba(0,229,255,.25)'; selCtx.lineWidth=1; selCtx.setLineDash([3,3]);
    for(let i=1;i<4;i++){const lx=sw/4*i;selCtx.beginPath();selCtx.moveTo(sx+lx,sy);selCtx.lineTo(sx+lx,sy+sh);selCtx.stroke();}
    for(let i=1;i<4;i++){const ly=sh/4*i;selCtx.beginPath();selCtx.moveTo(sx,sy+ly);selCtx.lineTo(sx+sw,sy+ly);selCtx.stroke();}
    selCtx.setLineDash([]);
  }
}

// ─── Auto-detect 4×4 grid ─────────────────────────────────────────────────────
async function autoDetect() {
  if (!sourceImage) return;
  const btn = document.getElementById('autoDetectBtn');
  btn.disabled = true; btn.textContent = '⚙ 偵測中…';

  // Draw full image to offscreen for analysis
  const oc = document.createElement('canvas');
  oc.width = sourceImage.width; oc.height = sourceImage.height;
  oc.getContext('2d').drawImage(sourceImage, 0, 0);
  const imageData = oc.getContext('2d').getImageData(0, 0, oc.width, oc.height);

  const colLines = detectGridLines(imageData, 'x', 4);  // 5 x-boundaries
  const rowLines = detectGridLines(imageData, 'y', 4);  // 5 y-boundaries

  // Clear all slots first
  clearAll();
  cropHistory.fill(null);

  let idx = 0;
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++, idx++) {
      setSlotProcessing(idx);
    }
  }

  // Process each cell asynchronously to keep UI responsive
  idx = 0;
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++, idx++) {
      const crop = {
        x: colLines[c],
        y: rowLines[r],
        w: colLines[c+1] - colLines[c],
        h: rowLines[r+1] - rowLines[r]
      };
      cropHistory[idx] = { ...crop };

      // Highlight current cell in selection
      sel = { x: crop.x, y: crop.y, w: crop.w, h: crop.h };
      syncInputs(); drawSel();

      await sleep(0); // yield to render
      const result = cropAndProcess(crop);
      if (result) setSlotResult(idx, result);
      else setSlotEmpty(idx);
    }
  }

  // Reset selection to full image
  resetSel();
  btn.disabled = false; btn.textContent = '✦ 自動偵測貼圖';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function detectGridLines(imageData, axis, divisions) {
  const { data, width, height } = imageData;
  const size      = axis === 'x' ? width  : height;
  const crossSize = axis === 'x' ? height : width;

  // Brightness projection
  const proj = new Float32Array(size);
  for (let i = 0; i < size; i++) {
    let sum = 0;
    for (let j = 0; j < crossSize; j++) {
      const idx = axis === 'x' ? (j*width+i)*4 : (i*width+j)*4;
      const a = data[idx+3];
      if (a < 64) { sum += 255*3; continue; }
      sum += data[idx] + data[idx+1] + data[idx+2];
    }
    proj[i] = sum / crossSize;
  }

  // Smooth
  const smooth = new Float32Array(size);
  const r = Math.max(2, Math.round(size * 0.012));
  for (let i = 0; i < size; i++) {
    let s=0, n=0;
    for (let k=Math.max(0,i-r); k<=Math.min(size-1,i+r); k++) { s+=proj[k]; n++; }
    smooth[i] = s/n;
  }

  // Find separator positions: search around each expected grid line for the brightest band
  const lines = [0];
  const step = size / divisions;
  for (let d = 1; d < divisions; d++) {
    const center = Math.round(d * step);
    const range  = Math.round(step * 0.3);
    const lo = Math.max(1, center - range);
    const hi = Math.min(size-2, center + range);
    let bestIdx=center, bestVal=-Infinity;
    for (let i=lo; i<=hi; i++) if (smooth[i]>bestVal) { bestVal=smooth[i]; bestIdx=i; }
    lines.push(bestIdx);
  }
  lines.push(size);
  return lines;
}

// ─── Manual crop ──────────────────────────────────────────────────────────────
function manualCrop() {
  if (!sourceImage || !sel.w || !sel.h) return;
  const emptyIdx = stickers.findIndex(s => !s);
  if (emptyIdx < 0) { alert('已達 16 張上限'); return; }
  const crop = { x:Math.round(sel.x), y:Math.round(sel.y), w:Math.round(sel.w), h:Math.round(sel.h) };
  cropHistory[emptyIdx] = { ...crop };
  setSlotProcessing(emptyIdx);
  const result = cropAndProcess(crop);
  if (result) setSlotResult(emptyIdx, result);
  else setSlotEmpty(emptyIdx);
}

// ─── Redo all ─────────────────────────────────────────────────────────────────
async function redoAll() {
  if (!sourceImage) return;
  const btn = document.getElementById('redoAllBtn');
  btn.disabled = true; btn.textContent = '處理中…';
  for (let i = 0; i < MAX_SLOTS; i++) {
    if (!cropHistory[i]) { setSlotEmpty(i); continue; }
    setSlotProcessing(i);
    await sleep(0);
    const result = cropAndProcess(cropHistory[i]);
    if (result) setSlotResult(i, result);
    else setSlotEmpty(i);
  }
  btn.disabled = false; btn.textContent = '↺ 全部重來';
}

// ─── Crop + process ───────────────────────────────────────────────────────────
function cropAndProcess(crop) {
  if (!sourceImage) return null;
  const { x, y, w, h } = crop;
  if (w < 2 || h < 2) return null;

  const cropC = document.createElement('canvas');
  cropC.width = w; cropC.height = h;
  cropC.getContext('2d').drawImage(sourceImage, x, y, w, h, 0, 0, w, h);

  if (document.getElementById('keepBg').checked) return cropC;
  return processCanvas(cropC);
}

function processCanvas(srcC) {
  const w=srcC.width, h=srcC.height;
  const ctx=srcC.getContext('2d');
  const { data } = ctx.getImageData(0, 0, w, h);

  const bgColor    = hexToRgb(document.getElementById('bgColor').value) || detectBgColor(data, w, h);
  const threshold  = (parseInt(document.getElementById('tolerance').value)/100)*441.67;
  const borderWidth= parseInt(document.getElementById('borderWidth').value);
  const autoCenter = document.getElementById('autoCenter').checked;
  const forceSquare= document.getElementById('forceSquare').checked;
  const removeHoles= document.getElementById('removeHoles').checked;

  const removeMap = floodFillBg(data, w, h, bgColor, threshold);
  if (removeHoles) fillHoles(removeMap, w, h);

  const px = new Uint8ClampedArray(data);
  for (let i=0; i<w*h; i++) if (removeMap[i]) px[i*4+3]=0;

  const bbox = getBBox(px, w, h);
  if (!bbox) return srcC;

  let cW=bbox.w, cH=bbox.h;
  if (forceSquare) cW=cH=Math.max(cW,cH);
  const offX=(autoCenter||forceSquare)?Math.floor((cW-bbox.w)/2):0;
  const offY=(autoCenter||forceSquare)?Math.floor((cH-bbox.h)/2):0;

  const trimC = document.createElement('canvas');
  trimC.width=cW; trimC.height=cH;
  const trimCtx = trimC.getContext('2d');
  const maskedC = document.createElement('canvas');
  maskedC.width=w; maskedC.height=h;
  maskedC.getContext('2d').putImageData(new ImageData(px,w,h),0,0);
  trimCtx.drawImage(maskedC, bbox.x, bbox.y, bbox.w, bbox.h, offX, offY, bbox.w, bbox.h);

  const outW=cW+borderWidth*2, outH=cH+borderWidth*2;
  const outC=document.createElement('canvas');
  outC.width=outW; outC.height=outH;
  const outCtx=outC.getContext('2d');

  if (borderWidth>0) {
    const td=trimCtx.getImageData(0,0,cW,cH).data;
    const sa=new Uint8Array(cW*cH);
    for(let i=0;i<cW*cH;i++) sa[i]=td[i*4+3];
    const ea=new Uint8Array(outW*outH);
    for(let y=0;y<cH;y++) for(let x=0;x<cW;x++) ea[(y+borderWidth)*outW+(x+borderWidth)]=sa[y*cW+x];
    const dil=dilateAlpha(ea,outW,outH,borderWidth);
    const wd=outCtx.createImageData(outW,outH);
    for(let i=0;i<outW*outH;i++) if(dil[i]>10){wd.data[i*4]=wd.data[i*4+1]=wd.data[i*4+2]=255;wd.data[i*4+3]=dil[i];}
    outCtx.putImageData(wd,0,0);
  }
  outCtx.drawImage(trimC, borderWidth, borderWidth);
  return outC;
}

// ─── Download ─────────────────────────────────────────────────────────────────
function downloadOne(i) {
  const c = stickers[i];
  if (!c) return;
  c.toBlob(blob => {
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`sticker_${String(i+1).padStart(2,'0')}.png`;
    a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  }, 'image/png');
}

async function downloadZip() {
  const filled = stickers.filter(Boolean);
  if (!filled.length) { alert('尚未有任何貼圖'); return; }
  const btns = [document.getElementById('downloadZipBtn'), document.getElementById('dlAllBtn')];
  btns.forEach(b => { if(b){b.disabled=true; b.textContent='打包中…';} });

  const zip = new JSZip();
  await Promise.all(stickers.map((c,i) => {
    if (!c) return null;
    return new Promise(res => c.toBlob(blob => {
      zip.file(`sticker_${String(i+1).padStart(2,'0')}.png`, blob); res();
    }, 'image/png'));
  }).filter(Boolean));

  const blob = await zip.generateAsync({ type:'blob' });
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='line_stickers.zip'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  btns.forEach(b => { if(b){b.disabled=false; b.textContent= b.id==='dlAllBtn' ? '↓ 下載 ZIP' : '↓ 下載 ZIP';} });
  document.getElementById('downloadZipBtn').textContent='↓ 下載 ZIP';
  document.getElementById('dlAllBtn').textContent='↓ 下載 ZIP';
}

function autoDetectBg() {
  if (!sourceImage) return;
  const c=document.createElement('canvas'); c.width=sourceImage.width; c.height=sourceImage.height;
  c.getContext('2d').drawImage(sourceImage,0,0);
  const {data}=c.getContext('2d').getImageData(0,0,c.width,c.height);
  const color=detectBgColor(data,c.width,c.height);
  document.getElementById('bgColor').value=rgbToHex(...color);
}

// ─── Algorithms ───────────────────────────────────────────────────────────────
function detectBgColor(data,w,h){
  const sz=8,s=[];
  [[0,0],[Math.max(0,w-sz),0],[0,Math.max(0,h-sz)],[Math.max(0,w-sz),Math.max(0,h-sz)]].forEach(([cx,cy])=>{
    for(let dy=0;dy<sz&&cy+dy<h;dy++) for(let dx=0;dx<sz&&cx+dx<w;dx++){const i=((cy+dy)*w+(cx+dx))*4;s.push([data[i],data[i+1],data[i+2]]);}
  });
  if(!s.length)return[255,255,255];
  const m=Math.floor(s.length/2);
  return[[...s.map(v=>v[0])].sort((a,b)=>a-b)[m],[...s.map(v=>v[1])].sort((a,b)=>a-b)[m],[...s.map(v=>v[2])].sort((a,b)=>a-b)[m]];
}

function floodFillBg(data,w,h,bgColor,threshold){
  const rm=new Uint8Array(w*h),vis=new Uint8Array(w*h),q=new Int32Array(w*h);
  let qH=0,qT=0; const[br,bg_,bb]=bgColor;
  function dist(idx){const i=idx*4,dr=data[i]-br,dg=data[i+1]-bg_,db=data[i+2]-bb;return Math.sqrt(dr*dr+dg*dg+db*db);}
  function add(x,y){if(x<0||x>=w||y<0||y>=h)return;const idx=y*w+x;if(vis[idx])return;vis[idx]=1;if(dist(idx)<=threshold){rm[idx]=1;q[qT++]=idx;}}
  for(let x=0;x<w;x++){add(x,0);add(x,h-1);}for(let y=1;y<h-1;y++){add(0,y);add(w-1,y);}
  while(qH<qT){const idx=q[qH++];const x=idx%w,y=(idx-x)/w;add(x-1,y);add(x+1,y);add(x,y-1);add(x,y+1);}
  return rm;
}

function fillHoles(rm,w,h){
  const ext=new Uint8Array(w*h),q=new Int32Array(w*h);let qH=0,qT=0;
  function add(x,y){if(x<0||x>=w||y<0||y>=h)return;const idx=y*w+x;if(ext[idx]||!rm[idx])return;ext[idx]=1;q[qT++]=idx;}
  for(let x=0;x<w;x++){add(x,0);add(x,h-1);}for(let y=1;y<h-1;y++){add(0,y);add(w-1,y);}
  while(qH<qT){const idx=q[qH++];const x=idx%w,y=(idx-x)/w;add(x-1,y);add(x+1,y);add(x,y-1);add(x,y+1);}
  for(let i=0;i<w*h;i++)if(rm[i]&&!ext[i])rm[i]=0;
}

function getBBox(data,w,h){
  let x0=w,y0=h,x1=-1,y1=-1;
  for(let y=0;y<h;y++) for(let x=0;x<w;x++) if(data[(y*w+x)*4+3]>10){if(x<x0)x0=x;if(x>x1)x1=x;if(y<y0)y0=y;if(y>y1)y1=y;}
  if(x1<0)return null;
  return{x:x0,y:y0,w:x1-x0+1,h:y1-y0+1};
}

function dilateAlpha(alpha,w,h,r){
  const hP=new Uint8Array(w*h);
  for(let y=0;y<h;y++){const row=y*w;for(let x=0;x<w;x++){let max=0;const x0=Math.max(0,x-r),x1=Math.min(w-1,x+r);for(let nx=x0;nx<=x1;nx++){const v=alpha[row+nx];if(v>max){max=v;if(max===255)break;}}hP[row+x]=max;}}
  const res=new Uint8Array(w*h);
  for(let x=0;x<w;x++){for(let y=0;y<h;y++){let max=0;const y0=Math.max(0,y-r),y1=Math.min(h-1,y+r);for(let ny=y0;ny<=y1;ny++){const v=hP[ny*w+x];if(v>max){max=v;if(max===255)break;}}res[y*w+x]=max;}}
  return res;
}

function hexToRgb(hex){if(!hex||hex.length<7)return null;return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');}
